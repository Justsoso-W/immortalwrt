name: Build ImmortalWrt for MSM8916 (JZ02_V10 + OpenAppFilter)

on:
  workflow_dispatch:
    inputs:
      ssh_connect:
        description: 'Enable SSH connection during build (debug)'
        required: false
        default: false
        type: boolean
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ImmortalWrt MSM8916 with OAF
    runs-on: ubuntu-24.04

    env:
        REPO_URL: https://github.com/lkiuyu/immortalwrt
        REPO_BRANCH: master
        DEVICE_TARGET: msm89xx
        DEVICE_SUBTARGET: msm8916
        DEVICE_NAME: openstick-jz02v10
        FIRMWARE_DIR: bin/targets/msm89xx/msm8916

    steps:
      - name: Check environment
        run: |
            df -h
            nproc

      - name: Clean up runner disk space
        run: |
            sudo rm -rf /usr/share/dotnet /opt/hostedtoolcache /usr/local/lib/android
            sudo docker system prune -af 2>/dev/null || true
            df -h /

      - name: Install build dependencies
        run: |
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends \
                build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
                gettext git libncurses5-dev libssl-dev python3-setuptools \
                rsync swig unzip zlib1g-dev file wget curl \
                qemu-utils python3 python3-pip \
                u-boot-tools device-tree-compiler
            sudo apt-get clean

      - name: Checkout ImmortalWrt (lkiuyu fork with msm89xx)
        uses: actions/checkout@v4
        with:
            repository: lkiuyu/immortalwrt
            ref: master
            path: immortalwrt
            fetch-depth: 1

      - name: Clone OpenAppFilter into package/
        working-directory: ./immortalwrt
        run: |
            git clone --depth=1 https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter

      - name: Update feeds
        working-directory: ./immortalwrt
        run: |
            ./scripts/feeds update -a
            ./scripts/feeds install -a

      - name: Restore DL cache
        uses: actions/cache@v4
        with:
            path: immortalwrt/dl
            key: dl-cache-msm8916-${{ hashFiles('immortalwrt/dl/*', 'immortalwrt/Makefile') }}
            restore-keys: |
                dl-cache-msm8916-

      - name: Build configuration
        working-directory: ./immortalwrt
        run: |
            cat > .config << 'EOF'
            # ========== Target: MSM8916 (JZ02_V10) ==========
            CONFIG_TARGET_msm89xx=y
            CONFIG_TARGET_msm89xx_msm8916=y
            CONFIG_TARGET_msm89xx_msm8916_DEVICE_openstick-jz02v10=y

            # ========== OpenAppFilter ==========
            CONFIG_PACKAGE_luci-app-oaf=y

            # ========== Luci 核心 ==========
            CONFIG_PACKAGE_luci=y
            CONFIG_PACKAGE_luci-ssl=y
            CONFIG_PACKAGE_luci-mod-admin-full=y
            CONFIG_PACKAGE_luci-compat=y
            CONFIG_PACKAGE_luci-lib-docker=y

            # ========== Luci 协议支持 ==========
            CONFIG_PACKAGE_luci-proto-ipv6=y
            CONFIG_PACKAGE_luci-proto-mbim=y
            CONFIG_PACKAGE_luci-proto-modemmanager=y
            CONFIG_PACKAGE_luci-proto-ncm=y
            CONFIG_PACKAGE_luci-proto-ppp=y
            CONFIG_PACKAGE_luci-proto-qmi=y
            CONFIG_PACKAGE_luci-proto-wireguard=y

            # ========== Luci 应用（系统类） ==========
            CONFIG_PACKAGE_luci-app-ttyd=y
            CONFIG_PACKAGE_luci-app-cpu-perf-mini=y
            CONFIG_PACKAGE_luci-app-cpu-status=y
            CONFIG_PACKAGE_luci-app-temp-status=y
            CONFIG_PACKAGE_luci-app-netspeedtest=y
            CONFIG_PACKAGE_luci-app-package-manager=y
            CONFIG_PACKAGE_luci-app-advanced-reboot=y
            CONFIG_PACKAGE_luci-app-partexp=y

            # ========== Luci 应用（存储/文件） ==========
            CONFIG_PACKAGE_luci-app-diskman=y
            CONFIG_PACKAGE_luci-app-filebrowser-go=y
            CONFIG_PACKAGE_luci-app-samba4=y
            CONFIG_PACKAGE_luci-app-vsftpd=y
            CONFIG_PACKAGE_luci-app-transmission=y
            CONFIG_PACKAGE_luci-app-aria2=y

            # ========== Luci 应用（网络/防火墙） ==========
            CONFIG_PACKAGE_luci-app-firewall=y
            CONFIG_PACKAGE_luci-app-upnp=y
            CONFIG_PACKAGE_luci-app-turboacc=y
            CONFIG_PACKAGE_luci-app-eqos=y

            # ========== Luci 应用（代理/翻墙） ==========
            CONFIG_PACKAGE_luci-app-passwall=y
            CONFIG_PACKAGE_luci-app-passwall_OUTBOUND_NODE=y
            CONFIG_PACKAGE_luci-app-openclash=y
            CONFIG_PACKAGE_luci-app-homeproxy=y

            # ========== Luci 应用（VPN/远程） ==========
            CONFIG_PACKAGE_luci-app-tailscale=y
            CONFIG_PACKAGE_luci-app-zerotier=y
            CONFIG_PACKAGE_luci-app-easytier=y
            CONFIG_PACKAGE_luci-app-ddnstox=y
            CONFIG_PACKAGE_luci-app-frpc=y

            # ========== Luci 应用（DNS/去广告） ==========
            CONFIG_PACKAGE_luci-app-mosdns=y
            CONFIG_PACKAGE_luci-app-adblock-fast=y

            # ========== Luci 应用（4G 调制解调器） ==========
            CONFIG_PACKAGE_luci-app-modeminfo=y
            CONFIG_PACKAGE_luci-app-mmconfig=y

            # ========== Luci 主题 ==========
            CONFIG_PACKAGE_luci-theme-argon=y
            CONFIG_PACKAGE_luci-app-argon-config=y

            # ========== 其他 Luci app ==========
            CONFIG_PACKAGE_luci-app-lucky=y
            CONFIG_PACKAGE_luci-app-taskplan=y
            CONFIG_PACKAGE_luci-app-advanced=y
            CONFIG_PACKAGE_luci-app-dockerman=y

            # ========== 网络基础 ==========
            CONFIG_PACKAGE_dnsmasq-full=y
            CONFIG_PACKAGE_firewall4=y
