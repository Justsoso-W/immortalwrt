                'CONFIG_PACKAGE_qmi-utils=y' \
                'CONFIG_PACKAGE_uqmi=y' \
                'CONFIG_PACKAGE_umbim=y' \
                'CONFIG_PACKAGE_comgt=y' \
                'CONFIG_PACKAGE_comgt-ncm=y' \
                'CONFIG_PACKAGE_atinout=y' \
                'CONFIG_PACKAGE_modeminfo=y' \
                'CONFIG_PACKAGE_modeminfo-qmi=y' \
                'CONFIG_PACKAGE_mmcli=y' \
                'CONFIG_PACKAGE_qtools=y' \
                'CONFIG_PACKAGE_btrfs-progs=y' \
                'CONFIG_PACKAGE_dosfstools=y' \
                'CONFIG_PACKAGE_e2fsprogs=y' \
                'CONFIG_PACKAGE_fdisk=y' \
                'CONFIG_PACKAGE_lsblk=y' \
                'CONFIG_PACKAGE_ntfs-3g=y' \
                'CONFIG_PACKAGE_ntfs-3g-utils=y' \
                'CONFIG_PACKAGE_exfat-fsck=y' \
                'CONFIG_PACKAGE_exfat-mkfs=y' \
                'CONFIG_PACKAGE_parted=y' \
                'CONFIG_PACKAGE_mount-utils=y' \
                'CONFIG_PACKAGE_block-mount=y' \
                'CONFIG_PACKAGE_f2fs-tools=y' \
                'CONFIG_PACKAGE_resize2fs=y' \
                'CONFIG_PACKAGE_perl=y' \
                'CONFIG_PACKAGE_python3=y' \
                'CONFIG_PACKAGE_python3-pip=y' \
                'CONFIG_PACKAGE_python3-light=y' \
                'CONFIG_PACKAGE_ruby=y' \
                'CONFIG_DEVEL=y' \
                'CONFIG_CCACHE=y' \
                'CONFIG_AUTOREMOVE=y' \
                > .config

      - name: Run defconfig
        working-directory: ./immortalwrt
        run: |
            make defconfig
            # Force-disable packages that fail to build (Go compilation issues)
            # geoview gets re-pulled by geoip deps; remove after defconfig
            sed -i '/CONFIG_PACKAGE_geoview=y/d' .config
            sed -i '/CONFIG_PACKAGE_geoview=m/d' .config
            echo 'CONFIG_PACKAGE_geoview=n' >> .config
            echo "=== Build config summary ==="
            grep -E '^(CONFIG_TARGET|CONFIG_PACKAGE_geoview|CONFIG_PACKAGE_luci-app-oaf)' .config | sort

      - name: Download source (prepare)
        working-directory: ./immortalwrt
        continue-on-error: true
        run: |
            make download -j$(nproc) 2>&1 | tee download.log | tail -40
            echo "=== Check for download failures ==="
            grep -E 'ERROR:|Failed to download' download.log || echo "No download errors found"

      - name: Retry failed downloads individually
        working-directory: ./immortalwrt
        run: |
            # Try to rebuild download stamps for openstick packages
            for pkg in gc libusbgx qrtr qcom-firmware; do
                echo "=== Retrying download: $pkg ==="
                make "package/feeds/openstick/$pkg/download" V=s 2>&1 | tail -5 || true
                # If the package source is still missing, try manual clone
                pkg_dir="$(find feeds/openstick/ -name "$pkg" -type d 2>/dev/null | head -1)"
                if [ -n "$pkg_dir" ]; then
                    echo "Package dir: $pkg_dir"
                    grep -E 'PKG_SOURCE_URL|PKG_SOURCE|PKG_VERSION|PKG_SOURCE_PROTO' "$pkg_dir/Makefile" | head -5
                fi
                echo ""
            done

      - name: Remove broken downloads
        working-directory: ./immortalwrt
        run: |
            find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true
            echo "=== DL directory ==="
            du -sh dl/

      - name: Build firmware (parallel, with single-thread fallback)
        working-directory: ./immortalwrt
        run: |
            # Fail fast — do NOT use continue-on-error. Previous workflows swallowed
            # real build failures and uploaded empty artifacts.
            make -j$(nproc) 2>&1 | tee build.log | tail -200
            rc=${PIPESTATUS[0]}
            echo "=== Parallel build exit code: $rc ==="
            if [ $rc -ne 0 ]; then
                echo "=== Parallel build failed, retrying single-threaded for diagnostics ==="
                make -j1 V=s 2>&1 | tee build-single.log | tail -200
                echo "=== Single-thread build exit code: ${PIPESTATUS[0]} ==="
                # Hard-fail the step so subsequent upload steps are skipped.
                exit 1
            fi

      - name: Verify firmware output
        working-directory: ./immortalwrt
        run: |
            echo "=== Firmware files ==="
            mapfile -t FW_FILES < <(find ${{ env.FIRMWARE_DIR }} -type f \( -name "*.img" -o -name "*.gz" -o -name "*.bin" \) 2>/dev/null | sort)
            if [ ${#FW_FILES[@]} -eq 0 ]; then
                echo "::error::No firmware images found in ${{ env.FIRMWARE_DIR }} — build did not produce output"
                echo "=== Build log error excerpt ==="
                if [ -f build.log ]; then
                    grep -E '(ERROR|Fail|error:|Error|make.*Error)' build.log | head -30 || echo "(no error lines found in build.log)"
                else
                    echo "(no build.log present)"
                fi
                exit 1
            fi
            printf '%s\n' "${FW_FILES[@]}"
            echo "=== File sizes ==="
            find ${{ env.FIRMWARE_DIR }} -type f \( -name "*.img" -o -name "*.gz" -o -name "*.bin" \) -exec ls -lh {} \;
            echo "=== Build log error excerpt ==="
            if [ -f build.log ]; then
                grep -E '(ERROR|Fail|error:|Error|make.*Error)' build.log | head -20 || echo "No errors found"
            fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
            name: immortalwrt-msm8916-oaf-jz02v10
            path: |
                immortalwrt/${{ env.FIRMWARE_DIR }}/*.img
                immortalwrt/${{ env.FIRMWARE_DIR }}/*.gz
                immortalwrt/${{ env.FIRMWARE_DIR }}/sha256sums
                immortalwrt/build.log*
                !immortalwrt/${{ env.FIRMWARE_DIR }}/packages
            retention-days: 30
            if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
            name: build-log
            path: immortalwrt/build*.log
            retention-days: 14
