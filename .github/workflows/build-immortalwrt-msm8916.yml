name: Build ImmortalWrt for MSM8916 (JZ02_V10 + OpenAppFilter)

on:
  workflow_dispatch:
    inputs:
      ssh_connect:
        description: 'Enable SSH connection during build (debug)'
        required: false
        default: false
        type: boolean
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ImmortalWrt MSM8916 with OAF
    runs-on: ubuntu-24.04

    env:
        # Use our own fork so we control the source — the upstream lkiuyu/immortalwrt
        # receives random commits that can break this build at any time.
        # Pinned to a specific commit SHA for reproducibility.
        REPO_URL: https://github.com/Justsoso-W/immortalwrt
        REPO_BRANCH: fix/build-stability
        REPO_COMMIT: a392d5d84114168db58ae610f59bcb08827d5a17
        DEVICE_TARGET: msm89xx
        DEVICE_SUBTARGET: msm8916
        DEVICE_NAME: openstick-jz02v10
        FIRMWARE_DIR: bin/targets/msm89xx/msm8916

    steps:
      - name: Check environment
        run: |
            df -h
            nproc

      - name: Clean up runner disk space
        run: |
            sudo rm -rf /usr/share/dotnet /opt/hostedtoolcache /usr/local/lib/android
            sudo docker system prune -af 2>/dev/null || true
            df -h /

      - name: Install build dependencies
        run: |
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends \
                build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
                gettext git libncurses5-dev libssl-dev python3-setuptools \
                rsync swig unzip zlib1g-dev file wget curl \
                qemu-utils python3 python3-pip \
                u-boot-tools device-tree-compiler
            sudo apt-get clean

      - name: Checkout ImmortalWrt (Justsoso-W fork, branch ref)
        uses: actions/checkout@v4
        with:
            repository: Justsoso-W/immortalwrt
            ref: ${{ env.REPO_BRANCH }}
            path: immortalwrt
            fetch-depth: 1

      - name: Clone OpenAppFilter into package/
        working-directory: ./immortalwrt
        run: |
            git clone --depth=1 https://github.com/destan19/OpenAppFilter.git package/OpenAppFilter

      - name: Update feeds
        working-directory: ./immortalwrt
        run: |
            ./scripts/feeds update -a
            ./scripts/feeds install -a

      - name: Patch Go toolchain to 1.24.13
        working-directory: ./immortalwrt
        run: |
            set -e
            mkdir -p feeds/packages/lang/golang/golang1.24
            echo "" | base64 -d > feeds/packages/lang/golang/golang1.24/Makefile
            chmod 644 feeds/packages/lang/golang/golang1.24/Makefile
            sed -i 's/^GO_DEFAULT_VERSION:=1.26/GO_DEFAULT_VERSION:=1.24/' feeds/packages/lang/golang/golang-values.mk
            # Re-run feeds update so the new Makefile is picked up
            ./scripts/feeds update -a 2>&1 | tail -10
            # Direct symlink instead of relying on feeds install. feeds install
            # silently skipped golang1.24 in the previous run, so we just create
            # the package/ symlink by hand. OpenWrt build system reads Makefiles
            # through these symlinks.
            mkdir -p package/feeds/packages/lang/golang
            ln -sf ../../../../feeds/packages/lang/golang/golang1.24 package/feeds/packages/lang/golang/golang1.24
            echo "=== Verify symlink ==="
            ls -la package/feeds/packages/lang/golang/
            echo ""
            echo "=== Verify GO_DEFAULT_VERSION ==="
            grep "GO_DEFAULT_VERSION" feeds/packages/lang/golang/golang-values.mk
            rm -rf build_dir/hostpkg/go-1.26* build_dir/target-*/go-1.26* tmp/go-build 2>/dev/null || true
      - name: Restore DL cache
        uses: actions/cache@v4
        with:
            path: immortalwrt/dl
            key: dl-cache-msm8916-${{ hashFiles('immortalwrt/dl/*', 'immortalwrt/Makefile') }}
            restore-keys: |
                dl-cache-msm8916-

      - name: Build configuration
        working-directory: ./immortalwrt
        run: |
            # Write .config using printf (avoids heredoc YAML issues)
            printf '%s\n' \
                'CONFIG_TARGET_msm89xx=y' \
                'CONFIG_TARGET_msm89xx_msm8916=y' \
                'CONFIG_TARGET_msm89xx_msm8916_DEVICE_openstick-jz02v10=y' \
                'CONFIG_PACKAGE_luci-app-oaf=y' \
                'CONFIG_PACKAGE_luci=y' \
                'CONFIG_PACKAGE_luci-ssl=y' \
                'CONFIG_PACKAGE_luci-mod-admin-full=y' \
                'CONFIG_PACKAGE_luci-compat=y' \
                'CONFIG_PACKAGE_luci-lib-docker=y' \
                'CONFIG_PACKAGE_luci-proto-ipv6=y' \
                'CONFIG_PACKAGE_luci-proto-mbim=y' \
                'CONFIG_PACKAGE_luci-proto-modemmanager=y' \
                'CONFIG_PACKAGE_luci-proto-ncm=y' \
                'CONFIG_PACKAGE_luci-proto-ppp=y' \
